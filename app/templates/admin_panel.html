{% extends "base.html" %}

{% block navbar_items %}
<li class="nav-item">
    <a class="nav-link text-dark fw-bold" href="/"><i class="fa-solid fa-house"></i> 返回大厅</a>
</li>
{% endblock %}

{% block content %}
<div class="row g-4 animate__animated animate__fadeIn">
    <div class="col-lg-3">
        <div class="glass-card p-4 sticky-top" style="top: 100px;">
            <h5 class="fw-bold mb-4 text-primary"><i class="fa-solid fa-screwdriver-wrench me-2"></i>管理中心</h5>
            <div class="nav flex-column nav-pills" id="adminTabs" role="tablist">
                <button class="nav-link active text-start mb-2" id="users-tab" data-bs-toggle="pill" data-bs-target="#tab-users">
                    <i class="fa-solid fa-user-check me-2"></i> 身份核验 <span class="badge bg-danger ms-2" id="user-count">0</span>
                </button>
                <button class="nav-link text-start mb-2" id="elections-tab" data-bs-toggle="pill" data-bs-target="#tab-elections">
                    <i class="fa-solid fa-clipboard-check me-2"></i> 提议审批 <span class="badge bg-warning ms-2" id="election-count">0</span>
                </button>
                <button class="nav-link text-start" id="stats-tab" data-bs-toggle="pill" data-bs-target="#tab-stats">
                    <i class="fa-solid fa-chart-pie me-2"></i> 数据总览
                </button>
            </div>
        </div>
    </div>

    <div class="col-lg-9">
        <div class="tab-content" id="adminTabsContent">
            
            <div class="tab-pane fade show active" id="tab-users">
                <div class="glass-card p-4">
                    <h4 class="fw-bold mb-4">待审核学生名单</h4>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>学号</th>
                                    <th>姓名</th>
                                    <th>院系专业</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="pending-users-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="tab-elections">
                <div class="glass-card p-4">
                    <h4 class="fw-bold mb-4">待审批投票项目</h4>
                    <div id="pending-elections-list">
                        </div>
                </div>
            </div>

            <div class="tab-pane fade" id="tab-stats">
                <div class="glass-card p-5 text-center">
                    <i class="fa-solid fa-rocket fa-3x text-primary mb-3"></i>
                    <h4>系统运行平稳</h4>
                    <p class="text-muted">实时监控模块已就绪，正在准备数据对接...</p>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // 页面加载完成后立即拉取待办事项
    document.addEventListener('DOMContentLoaded', () => {
        loadPendingUsers();
        loadPendingElections();
    });

    // 1. 加载并渲染待审核用户
    function loadPendingUsers() {
        fetch('/admin/users/pending')
            .then(res => res.json())
            .then(data => {
                const body = document.getElementById('pending-users-body');
                document.getElementById('user-count').innerText = data.data.length;
                body.innerHTML = data.data.map(u => `
                    <tr>
                        <td><span class="badge bg-light text-dark border">${u.student_id}</span></td>
                        <td><b class="text-primary">${u.name}</b></td>
                        <td><small>${u.department}<br>${u.major}</small></td>
                        <td>
                            <button class="btn btn-success btn-sm rounded-pill px-3" onclick="handleUser(${u.id}, 'pass')">通过</button>
                            <button class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="handleUser(${u.id}, 'reject')">驳回</button>
                        </td>
                    </tr>
                `).join('');
                if(data.data.length === 0) body.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">暂无待审核申请</td></tr>';
            });
    }

    // 2. 加载并渲染待审批提议
    function loadPendingElections() {
        fetch('/admin/elections/pending')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('pending-elections-list');
                document.getElementById('election-count').innerText = data.data.length;
                list.innerHTML = data.data.map(e => `
                    <div class="card border-0 shadow-sm mb-3 p-3" style="background: rgba(255,255,255,0.5);">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="fw-bold mb-1">${e.title}</h5>
                                <p class="small text-muted mb-0">提议人: ${e.proposer_name} | 详情: ${e.description}</p>
                            </div>
                            <div>
                                <button class="btn btn-primary btn-sm" onclick="handleElection(${e.id}, 'approve')">准予发布</button>
                                <button class="btn btn-light btn-sm" onclick="handleElection(${e.id}, 'reject')">拒绝</button>
                            </div>
                        </div>
                    </div>
                `).join('');
                if(data.data.length === 0) list.innerHTML = '<p class="text-center text-muted py-4">暂无提议项目</p>';
            });
    }

    // 处理用户审核
    function handleUser(id, action) {
        fetch('/admin/users/approve', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({user_id: id, action: action})
        }).then(res => res.json()).then(data => {
            showMessage(data.msg);
            loadPendingUsers();
        });
    }

    // 处理提议审核
    function handleElection(id, action) {
        fetch('/admin/elections/review', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({election_id: id, action: action})
        }).then(res => res.json()).then(data => {
            showMessage(data.msg);
            loadPendingElections();
        });
    }
</script>
{% endblock %}
