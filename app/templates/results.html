{% extends "base.html" %}

{% block navbar_items %}
<li class="nav-item">
    <a class="nav-link text-dark fw-bold" href="/"><i class="fa-solid fa-house"></i> 返回大厅</a>
</li>
<li class="nav-item">
    <button class="btn btn-outline-primary btn-sm rounded-pill ms-2" onclick="window.print()">
        <i class="fa-solid fa-print"></i> 打印/导出报告
    </button>
</li>
{% endblock %}

{% block content %}
<div class="row mb-4 animate__animated animate__fadeInDown">
    <div class="col-12">
        <div class="glass-card p-4 d-flex justify-content-between align-items-center">
            <div>
                <h2 class="fw-bolder mb-1 text-primary" id="election-title">
                    <i class="fa-solid fa-chart-pie me-2"></i>数据加载中...
                </h2>
                <p class="text-muted mb-0"><i class="fa-solid fa-circle-info me-1"></i> 实时选票统计与多维度数据分析大屏</p>
            </div>
            <div>
                <span class="badge bg-success rounded-pill px-3 py-2 fs-6 shadow-sm">
                    总投票数: <span id="total-votes">0</span> 票
                </span>
            </div>
        </div>
    </div>
</div>

<div class="row g-4 animate__animated animate__fadeInUp">
    <div class="col-lg-7">
        <div class="glass-card p-4 h-100">
            <h5 class="fw-bold mb-3"><i class="fa-solid fa-ranking-star text-warning me-2"></i>候选人得票排行</h5>
            <div id="barChart" style="width: 100%; height: 400px;"></div>
        </div>
    </div>

    <div class="col-lg-5">
        <div class="glass-card p-4 h-100">
            <h5 class="fw-bold mb-3"><i class="fa-solid fa-users-viewfinder text-info me-2"></i>投票人群院系画像</h5>
            <div id="pieChart" style="width: 100%; height: 400px;"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 初始化 ECharts 实例
        var barChart = echarts.init(document.getElementById('barChart'));
        var pieChart = echarts.init(document.getElementById('pieChart'));

        // 显示加载动画
        barChart.showLoading({ text: '数据努力加载中...', color: '#4776E6' });
        pieChart.showLoading({ text: '画像生成中...', color: '#4776E6' });

        // 获取URL中的选举ID，假设路由为 /election/1/results
        // 这里我们从页面注入的变量获取，稍后在 main.py 中我们会传入 election_id
        const electionId = "{{ election_id }}";

        // 请求后端统计数据接口
        fetch(`/api/vote/statistics/${electionId}`)
            .then(res => res.json())
            .then(data => {
                if (data.code !== 200) {
                    Swal.fire('获取数据失败', data.msg, 'error');
                    return;
                }

                const statsData = data.data;

                // 更新顶部标题和总票数
                document.getElementById('election-title').innerHTML = `<i class="fa-solid fa-chart-pie me-2"></i>${statsData.title} - 统计报告`;
                document.getElementById('total-votes').innerText = statsData.total_votes;

                // 隐藏加载动画
                barChart.hideLoading();
                pieChart.hideLoading();

                // 1. 渲染柱状图 (得票排行)
                const barOption = {
                    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                    xAxis: { 
                        type: 'category', 
                        data: statsData.candidates,
                        axisLabel: { interval: 0, rotate: 30 } // 名字太长倾斜显示
                    },
                    yAxis: { type: 'value', name: '得票数 (票)' },
                    series: [{
                        data: statsData.votes,
                        type: 'bar',
                        barWidth: '40%',
                        itemStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: '#8E54E9' },
                                { offset: 1, color: '#4776E6' }
                            ]),
                            borderRadius: [5, 5, 0, 0]
                        },
                        label: { show: true, position: 'top' }
                    }]
                };
                barChart.setOption(barOption);

                // 2. 渲染饼图 (院系分布)
                const pieOption = {
                    tooltip: { trigger: 'item', formatter: '{a} <br/>{b} : {c} 票 ({d}%)' },
                    legend: { orient: 'horizontal', bottom: 'bottom' },
                    series: [{
                        name: '院系分布',
                        type: 'pie',
                        radius: ['40%', '70%'], // 环形图效果
                        avoidLabelOverlap: false,
                        itemStyle: {
                            borderRadius: 10,
                            borderColor: '#fff',
                            borderWidth: 2
                        },
                        label: { show: false, position: 'center' },
                        emphasis: {
                            label: { show: true, fontSize: 20, fontWeight: 'bold' }
                        },
                        labelLine: { show: false },
                        data: statsData.departments // 数据格式需为: [{value: 10, name: '计科'}, ...]
                    }]
                };
                pieChart.setOption(pieOption);
            })
            .catch(err => {
                console.error('统计接口调用失败:', err);
                Swal.fire('网络错误', '无法连接到统计服务器', 'error');
            });

        // 响应式自适应：当浏览器窗口变化时，图表自动缩放
        window.addEventListener('resize', function() {
            barChart.resize();
            pieChart.resize();
        });
    });
</script>
{% endblock %}
